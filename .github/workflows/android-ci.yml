name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('mobile/android/**/*.gradle*', 'mobile/android/**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Write local.properties
        working-directory: mobile/android
        run: echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

      - name: Install Android SDK extension platform
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses
          "$SDKMANAGER" --channel=3 "platforms;android-36-ext20"

      - name: Make gradlew executable
        working-directory: mobile/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: mobile/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
